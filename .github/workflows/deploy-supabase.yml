name: Deploy Supabase (DB + functions)
# retry after token prefix fix (sbp_ not spb_)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_REGION: us-west-2
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Diagnose + deploy
        id: deploy
        continue-on-error: true
        env:
          RAW_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          RAW_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          RAW_PW: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set +e
          exec > >(tee deploy.log) 2>&1

          echo "=== Supabase CLI version ==="
          supabase --version || true

          TOKEN=$(printf '%s' "$RAW_TOKEN" | tr -d '[:space:]')
          REF=$(printf '%s'   "$RAW_REF"   | tr -d '[:space:]')
          PW=$(printf '%s'    "$RAW_PW"    | tr -d '[:space:]')

          echo ""
          echo "=== Diagnose secrets (post-trim) ==="
          echo "TOKEN length=${#TOKEN} prefix=${TOKEN:0:4}"
          echo "REF length=${#REF} value=${REF}"
          echo "PW length=${#PW}"

          # Validate PAT via Management API (does not enforce CLI regex).
          echo ""
          echo "=== Validate token via GET /v1/projects/${REF} ==="
          http=$(curl -s -o proj.json -w '%{http_code}' \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://api.supabase.com/v1/projects/${REF}")
          echo "HTTP ${http}"
          if [ "$http" != "200" ]; then
            echo "Body:"
            cat proj.json
            echo ""
            echo "::error::PAT inválido ou sem acesso ao projeto. Gere novo token e atualize SUPABASE_ACCESS_TOKEN."
            exit 1
          fi
          project_region=$(python3 -c 'import json; print(json.load(open("proj.json")).get("region",""))')
          echo "API confirms project region: $project_region"
          # If the user-supplied region differs from API, trust the API.
          if [ -n "$project_region" ] && [ "$project_region" != "$SUPABASE_REGION" ]; then
            echo "Overriding SUPABASE_REGION ($SUPABASE_REGION) with API value ($project_region)"
            SUPABASE_REGION="$project_region"
          fi

          ENC_PW=$(python3 -c 'import urllib.parse, os; print(urllib.parse.quote(os.environ["RAW_PW"].strip(), safe=""))')
          DB_URL="postgresql://postgres.${REF}:${ENC_PW}@aws-0-${SUPABASE_REGION}.pooler.supabase.com:5432/postgres"
          echo "DB host: aws-0-${SUPABASE_REGION}.pooler.supabase.com"

          echo ""
          echo "=== Apply migrations via psql ==="
          apt-get >/dev/null 2>&1 install -y postgresql-client || sudo apt-get -y -qq install postgresql-client >/dev/null 2>&1
          which psql || echo "psql missing, installing..."
          sudo apt-get -y -qq install postgresql-client >/dev/null 2>&1

          # Track migrations via supabase_migrations.schema_migrations table.
          psql "$DB_URL" -v ON_ERROR_STOP=1 -c "create schema if not exists supabase_migrations;" -c "
            create table if not exists supabase_migrations.schema_migrations (
              version text primary key,
              statements text[],
              name text
            );"
          psql_bootstrap=$?
          echo "psql bootstrap exit: $psql_bootstrap"

          db_status=0
          for f in supabase/migrations/*.sql; do
            ver=$(basename "$f" .sql | sed 's/_.*//')
            already=$(psql "$DB_URL" -Atc "select 1 from supabase_migrations.schema_migrations where version='$ver'" 2>/dev/null)
            if [ "$already" = "1" ]; then
              echo "skip $f (already applied)"
              continue
            fi
            echo "apply $f"
            psql "$DB_URL" -v ON_ERROR_STOP=1 -f "$f"
            s=$?
            if [ $s -ne 0 ]; then db_status=$s; break; fi
            psql "$DB_URL" -c "insert into supabase_migrations.schema_migrations(version,name) values('$ver','$(basename "$f" .sql)')"
          done
          echo "migrations exit: $db_status"

          echo ""
          echo "=== Deploy edge functions via Management API ==="
          deploy_function() {
            local name="$1"
            local verify_jwt="$2"
            echo "--- $name ---"
            local dir="supabase/functions/$name"
            if [ ! -d "$dir" ]; then echo "missing $dir"; return 1; fi
            # Install deno so we can bundle.
            if ! command -v deno >/dev/null 2>&1; then
              curl -sSL https://deno.land/install.sh | DENO_INSTALL=/usr/local sh -s -- -y >/dev/null 2>&1 || true
              export PATH="/usr/local/bin:$PATH"
            fi
            # Attempt CLI deploy first (handles bundling cleanly).
            SUPABASE_ACCESS_TOKEN="$TOKEN" supabase functions deploy "$name" --project-ref "$REF" ${verify_jwt:+--no-verify-jwt}
            return $?
          }
          deploy_function compute-session-score ""
          fn1_status=$?
          echo "fn1 exit: $fn1_status"

          deploy_function unico-webhook "no"
          fn2_status=$?
          echo "fn2 exit: $fn2_status"

          [ $db_status -eq 0 ] && [ $fn1_status -eq 0 ] && [ $fn2_status -eq 0 ]

      - name: Post log to issue #3
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          sed -i "s|${SUPABASE_ACCESS_TOKEN}|***TOKEN***|g" deploy.log 2>/dev/null || true
          sed -i "s|${SUPABASE_DB_PASSWORD}|***PW***|g"    deploy.log 2>/dev/null || true
          LOG=$(cat deploy.log)
          cat > body.md <<EOF
          ### Deploy run [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) — commit \`${GITHUB_SHA:0:7}\`

          Outcome: **${{ steps.deploy.outcome }}**

          <details><summary>deploy.log</summary>

          \`\`\`
          $LOG
          \`\`\`

          </details>
          EOF
          gh api repos/${{ github.repository }}/issues/3/comments \
            --method POST \
            -f "body=$(cat body.md)" > /dev/null

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-deploy-log
          path: deploy.log

      - name: Propagate failure
        if: steps.deploy.outcome == 'failure'
        run: exit 1
