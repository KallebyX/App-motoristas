name: Deploy Supabase (DB + functions)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Diagnose + deploy
        id: deploy
        continue-on-error: true
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set +e
          exec > >(tee deploy.log) 2>&1
          echo "=== Supabase CLI version ==="
          supabase --version || true

          echo ""
          echo "=== Diagnose secrets ==="
          fail=0
          for name in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF SUPABASE_DB_PASSWORD; do
            val="${!name}"
            if [ -z "$val" ]; then
              echo "$name: MISSING"
              fail=1
            else
              echo "$name: set (length=${#val})"
            fi
          done
          if [ "$fail" -eq 1 ]; then exit 1; fi

          ENC_PW=$(python3 -c 'import urllib.parse, os; print(urllib.parse.quote(os.environ["PGPASSWORD"], safe=""))')
          DB_URL="postgresql://postgres:${ENC_PW}@db.${SUPABASE_PROJECT_REF}.supabase.co:5432/postgres"

          echo ""
          echo "=== supabase db push ==="
          supabase db push --db-url "$DB_URL"
          db_status=$?
          echo "db push exit: $db_status"

          echo ""
          echo "=== supabase functions deploy compute-session-score ==="
          supabase functions deploy compute-session-score --project-ref "$SUPABASE_PROJECT_REF"
          fn1_status=$?
          echo "fn1 exit: $fn1_status"

          echo ""
          echo "=== supabase functions deploy unico-webhook ==="
          supabase functions deploy unico-webhook --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
          fn2_status=$?
          echo "fn2 exit: $fn2_status"

          [ $db_status -eq 0 ] && [ $fn1_status -eq 0 ] && [ $fn2_status -eq 0 ]

      - name: Post log to issue #3
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # Redact any secret accidentally captured. The setup-cli masks them
          # automatically, but double-checking is cheap.
          sed -i "s|${SUPABASE_ACCESS_TOKEN}|***TOKEN***|g" deploy.log 2>/dev/null || true
          sed -i "s|${SUPABASE_DB_PASSWORD}|***PW***|g"    deploy.log 2>/dev/null || true

          LOG=$(cat deploy.log)
          # GitHub issue comment max ~65k chars; log is always small here.
          cat > body.md <<EOF
          ### Deploy run [${RUN_ID}](https://github.com/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}) — commit \`${COMMIT_SHA:0:7}\`

          Outcome: **${{ steps.deploy.outcome }}**

          <details><summary>deploy.log</summary>

          \`\`\`
          $LOG
          \`\`\`

          </details>
          EOF

          gh api repos/${GITHUB_REPOSITORY}/issues/3/comments \
            --method POST \
            -f "body=$(cat body.md)" > /dev/null

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-deploy-log
          path: deploy.log

      - name: Propagate failure
        if: steps.deploy.outcome == 'failure'
        run: exit 1
