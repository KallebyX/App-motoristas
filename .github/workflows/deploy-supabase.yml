name: Deploy Supabase (DB + functions)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Project region for the shared connection pooler (IPv4). Default = us-east-1.
      SUPABASE_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Diagnose + deploy
        id: deploy
        continue-on-error: true
        env:
          RAW_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          RAW_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          RAW_PW: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set +e
          exec > >(tee deploy.log) 2>&1

          echo "=== Supabase CLI version ==="
          supabase --version || true

          # Trim whitespace / control chars that may have been captured during
          # copy-paste into the secret value.
          TOKEN=$(printf '%s' "$RAW_TOKEN" | tr -d '[:space:]')
          REF=$(printf '%s'   "$RAW_REF"   | tr -d '[:space:]')
          PW=$(printf '%s'    "$RAW_PW"    | tr -d '[:space:]')
          export SUPABASE_ACCESS_TOKEN="$TOKEN"

          echo ""
          echo "=== Diagnose secrets (post-trim) ==="
          for pair in "TOKEN:${TOKEN}" "REF:${REF}" "PW:${PW}"; do
            name="${pair%%:*}"
            val="${pair#*:}"
            if [ -z "$val" ]; then echo "$name: MISSING"; else echo "$name: length=${#val}"; fi
          done
          # Extra token diagnosis (format only — no value).
          if [[ "$TOKEN" =~ ^sbp_[a-f0-9]{40}$ ]]; then
            echo "TOKEN format: OK (matches ^sbp_[a-f0-9]{40}\$)"
          else
            echo "TOKEN format: DOES NOT MATCH ^sbp_[a-f0-9]{40}\$ — regenerate the PAT"
          fi

          ENC_PW=$(python3 -c 'import urllib.parse, os; print(urllib.parse.quote(os.environ["RAW_PW"].strip(), safe=""))')
          # Shared connection pooler (IPv4, session mode port 5432).
          # Docs: https://supabase.com/docs/guides/database/connecting-to-postgres
          DB_URL="postgresql://postgres.${REF}:${ENC_PW}@aws-0-${SUPABASE_REGION}.pooler.supabase.com:5432/postgres"
          echo "DB host: aws-0-${SUPABASE_REGION}.pooler.supabase.com (pooler/IPv4)"

          echo ""
          echo "=== supabase db push ==="
          supabase db push --db-url "$DB_URL"
          db_status=$?
          echo "db push exit: $db_status"

          echo ""
          echo "=== supabase functions deploy compute-session-score ==="
          supabase functions deploy compute-session-score --project-ref "$REF"
          fn1_status=$?
          echo "fn1 exit: $fn1_status"

          echo ""
          echo "=== supabase functions deploy unico-webhook ==="
          supabase functions deploy unico-webhook --project-ref "$REF" --no-verify-jwt
          fn2_status=$?
          echo "fn2 exit: $fn2_status"

          [ $db_status -eq 0 ] && [ $fn1_status -eq 0 ] && [ $fn2_status -eq 0 ]

      - name: Post log to issue #3
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          sed -i "s|${SUPABASE_ACCESS_TOKEN}|***TOKEN***|g" deploy.log 2>/dev/null || true
          sed -i "s|${SUPABASE_DB_PASSWORD}|***PW***|g"    deploy.log 2>/dev/null || true
          LOG=$(cat deploy.log)
          cat > body.md <<EOF
          ### Deploy run [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) — commit \`${GITHUB_SHA:0:7}\`

          Outcome: **${{ steps.deploy.outcome }}**

          <details><summary>deploy.log</summary>

          \`\`\`
          $LOG
          \`\`\`

          </details>
          EOF
          gh api repos/${{ github.repository }}/issues/3/comments \
            --method POST \
            -f "body=$(cat body.md)" > /dev/null

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-deploy-log
          path: deploy.log

      - name: Propagate failure
        if: steps.deploy.outcome == 'failure'
        run: exit 1
