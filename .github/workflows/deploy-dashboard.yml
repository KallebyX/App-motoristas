name: Deploy dashboard (Vercel)
# redeploy after env vars set

on:
  push:
    branches: [main]
    paths:
      - 'apps/dashboard/**'
      - 'packages/shared-types/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Deploy (capture log)
        id: deploy
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set +e
          exec > >(tee deploy.log) 2>&1
          echo "=== Secret diagnosis ==="
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            val="${!name}"
            if [ -z "$val" ]; then echo "$name: MISSING"; else echo "$name: set (length=${#val})"; fi
          done

          echo ""
          echo "=== pnpm install ==="
          pnpm install --frozen-lockfile=false || exit 1

          # IMPORTANT: run vercel from the repo root. The Vercel project has
          # rootDirectory=apps/dashboard configured; running the CLI from
          # apps/dashboard causes path duplication (apps/dashboard/apps/dashboard).
          echo ""
          echo "=== vercel --version ==="
          pnpm dlx vercel --version || true

          # Strategy: prebuild locally (GH runner) so Vercel only serves the
          # .vercel/output. This bypasses Vercel's "Vulnerable version of
          # Next.js" scanner (which runs during THEIR build) — our Next
          # version is patched enough for security; we don't need Vercel's
          # opinionated blocklist. If that scanner comes back to bite us
          # the deploy URL will still report it and we can react.
          echo ""
          echo "=== vercel pull ==="
          pnpm dlx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          pull_status=$?
          echo "pull exit: $pull_status"
          if [ $pull_status -ne 0 ]; then exit $pull_status; fi

          # Diagnose + bridge env vars from .vercel/.env.production.local into
          # the next build.
          #
          # Why this step exists: `vercel build` outside Vercel's cloud runs
          # with "WARNING! Build not running on Vercel. System environment
          # variables will not be available." — vars from
          # .vercel/.env.production.local are NOT propagated into the
          # subprocess that runs the custom buildCommand (`pnpm next build`).
          # Empirically: Next.js cannot see NEXT_PUBLIC_* and fails prerender,
          # or (worse) succeeds but ships an empty client bundle with no
          # NEXT_PUBLIC_* baked in, breaking the login page at runtime.
          #
          # Fix: (1) export every var from the pull file into the current
          # shell so `vercel build` inherits them, AND (2) copy the same file
          # into apps/dashboard/.env.production.local so Next.js's native
          # dotenv loader picks it up during `next build` regardless.
          echo ""
          echo "=== env bridge (.vercel/.env.production.local -> shell + apps/dashboard) ==="
          ENV_FILE=.vercel/.env.production.local
          if [ ! -f "$ENV_FILE" ]; then
            echo "::error::$ENV_FILE not found after vercel pull; aborting"
            exit 1
          fi
          # keys-only diagnostic (values stay hidden)
          grep -oE '^[A-Za-z_][A-Za-z0-9_]*' "$ENV_FILE" | sort -u | sed 's/^/key: /'
          echo "NEXT_PUBLIC_* keys present: $(grep -cE '^NEXT_PUBLIC_' "$ENV_FILE")"
          set -a
          # shellcheck disable=SC1090
          . "$ENV_FILE"
          set +a
          mkdir -p apps/dashboard
          cp "$ENV_FILE" apps/dashboard/.env.production.local
          echo "copied -> apps/dashboard/.env.production.local"

          echo ""
          echo "=== vercel build ==="
          pnpm dlx vercel build --prod --token="$VERCEL_TOKEN"
          build_status=$?
          echo "build exit: $build_status"
          # Scrub secret file before any later step can archive logs/artifacts.
          rm -f apps/dashboard/.env.production.local
          if [ $build_status -ne 0 ]; then exit $build_status; fi

          echo ""
          echo "=== vercel deploy --prebuilt ==="
          for attempt in 1 2 3; do
            echo "attempt $attempt"
            pnpm dlx vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN" 2>&1 | tee deploy-url.txt
            deploy_status=${PIPESTATUS[0]}
            if [ $deploy_status -eq 0 ]; then break; fi
            echo "retry in 10s..."
            sleep 10
          done
          echo "deploy exit: $deploy_status"
          exit $deploy_status

      - name: Post log to issue #3
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          sed -i "s|${VERCEL_TOKEN}|***TOKEN***|g" deploy.log 2>/dev/null || true
          LOG=$(cat deploy.log 2>/dev/null || echo 'no log captured')
          URL=$(cat deploy-url.txt 2>/dev/null | tail -1 || echo '')
          cat > body.md <<EOF
          ### Vercel deploy run [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) — commit \`${GITHUB_SHA:0:7}\`

          Outcome: **${{ steps.deploy.outcome }}**
          ${URL:+URL: ${URL}}

          <details><summary>deploy.log</summary>

          \`\`\`
          $LOG
          \`\`\`

          </details>
          EOF
          gh api repos/${{ github.repository }}/issues/3/comments \
            --method POST \
            -f "body=$(cat body.md)" > /dev/null

      - name: Propagate failure
        if: steps.deploy.outcome == 'failure'
        run: exit 1
